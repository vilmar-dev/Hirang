<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2f7fd1" />
<title>Student ID Registration</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="Style.css" />
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <header class="navbar">
    <div class="logo-circle" id="logoCircle">
      <img src="img/logu.png" alt="App Logo" />
    </div>
    <div class="navbar-title">
      Student ID Registration
      <span>Fair &amp; transparent classroom tools</span>
    </div>
    <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
  </header>

  <main class="page">

    <!-- Online/offline status -->
    <div class="status-banner online" id="statusBanner">
      <span class="status-dot"></span>
      <span id="statusText">Online — changes sync instantly</span>
    </div>

    <!-- ===================== CLASS CODE ENTRY ===================== -->
    <section class="card" id="classCodeCard">
      <h2>Enter Class Code</h2>
      <p class="card-sub">Ask your teacher for the class code, or use the link they shared.</p>

      <label>Class Code</label>
      <input type="text" id="classCodeInput" class="id-input" placeholder="ABC123" maxlength="8" autocomplete="off" />

      <button class="btn-primary" id="findClassBtn">Find Class</button>
      <p class="form-msg" id="classCodeMsg"></p>
    </section>

    <!-- ===================== REGISTRATION FORM (shown after class found) ===================== -->
    <section class="card hidden" id="registerCard">
      <h2 id="className">Class Name</h2>
      <p class="card-sub">Enter your assigned ID number and your full name.</p>

      <label>Your ID Number (1–45)</label>
      <input type="number" id="idInput" class="id-input" min="1" max="45" placeholder="00" />

      <label>Full Name</label>
      <input type="text" id="nameInput" placeholder="e.g. Juan Dela Cruz" />

      <button class="btn-primary" id="registerBtn">Register</button>
      <button class="btn-secondary" id="backToCodeBtn">← Use a different class code</button>
      <p class="form-msg" id="registerMsg"></p>
    </section>

    <!-- ===================== REGISTERED IDS OVERVIEW ===================== -->
    <section class="card hidden" id="idOverviewCard">
      <h2>Registered IDs</h2>
      <p class="card-sub" id="idOverviewSub">0 of 45 students registered</p>
      <div class="id-grid" id="idGrid"></div>
    </section>

  </main>

  <!-- ===================== FIREBASE SDKS (compat) ===================== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="Firebase.js"></script>
  <script src="App.js"></script>
</body>
</html>
